<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess the Number</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f2f4f8;

    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden; /* prevents scrolling */
}

#wrapper{
    background:white;
    padding:30px;
    border-radius:10px;
    width:340px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

h1{
    margin-bottom:10px;
}

p{
    color:#555;
    margin-bottom:8px;
}

input[type="text"]{
    width:80%;
    padding:10px;
    margin-top:12px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:16px;
}

input[type="submit"]{
    margin-top:12px;
    padding:10px 16px;
    border:none;
    background:#4CAF50;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

input[type="submit"]:hover{
    background:#43a047;
}

.resultParas{
    margin-top:18px;
}

.guesses{
    font-weight:bold;
}

.lastResult{
    font-weight:bold;
    color:red;
}

.lowOrHi{
    margin-top:10px;
    font-weight:bold;
}

</style>
</head>

<body>

<div id="wrapper">
    <h1>Number Guessing Game</h1>

    <p>Guess a number between <b>1 and 100</b></p>
    <p>You have <b>10 attempts</b></p>

    <form>
        <label for="guessField"><b>Guess</b></label><br>

        <input type="text" id="guessField" class="guessField"><br>

        <input type="submit" id="subt" value="Submit Guess">
    </form>

    <div class="resultParas">
        <p>Previous Guesses: <span class="guesses"></span></p>
        <p>Guesses Remaining: <span class="lastResult">10</span></p>
        <p class="lowOrHi"></p>
    </div>
</div>

<script src="04_script.js"></script>

</body>
</html>
